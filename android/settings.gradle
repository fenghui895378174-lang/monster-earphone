pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localFile = file("local.properties")
        if (localFile.exists()) {
            localFile.withInputStream { properties.load(it) }
        }
        def path = properties.getProperty("flutter.sdk")
        if (path == null) {
            path = System.getenv("FLUTTER_ROOT") ?: System.getenv("FLUTTER_HOME")
        }
        if (path == null) {
            throw new GradleException("flutter.sdk not set in local.properties and FLUTTER_ROOT not set")
        }
        return path
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "7.3.0" apply false
    id "org.jetbrains.kotlin.android" version "1.8.22" apply false
}

include ":app"
