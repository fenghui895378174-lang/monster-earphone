name: monster_earphone
description: "Monster Earphone Manager"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_blue_plus: ^1.31.15
  flutter_riverpod: ^2.5.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.68.0
  lottie: ^3.1.2
  permission_handler: ^11.3.1
  just_audio: ^0.9.41
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  geolocator: ^12.0.0
  audio_session: ^0.1.21
  device_info_plus: ^10.1.0
  vibration: ^2.0.0
  home_widget: ^0.6.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/fonts/
